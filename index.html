<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cidade 3D da Vida</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Comic Sans MS','Segoe UI',sans-serif; background:linear-gradient(#bfe9ff,#7ec850); min-height:100vh; overflow-x:hidden; }
.tela { max-width:1100px; margin:0 auto; padding:14px; }
.topo { text-align:center; color:#fff; margin-bottom:12px; text-shadow:1px 2px 4px rgba(0,0,0,.3); }
.topo h1 { font-size:clamp(22px,4vw,34px); }
.topo p { font-size:13px; opacity:.95; }

.viewport { position:relative; width:100%; height:clamp(380px,66vh,600px);
  background:linear-gradient(#a9e2ff 0%,#cdeeff 45%,#bfe9a0 46%,#9fd97a 100%);
  border-radius:18px; overflow:hidden; cursor:grab;
  box-shadow:inset 0 0 60px rgba(0,0,0,.12), 0 12px 30px rgba(0,0,0,.3); border:3px solid #fff; touch-action:none; }
.viewport.grabbing { cursor:grabbing; }
.mundo { position:absolute; top:0; left:0; will-change:transform; }

.tile { position:absolute; width:84px; height:42px; clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%); }
.grass { background:#8ed16b; box-shadow:inset 0 0 0 1px #7cc05a; }
.grass.alt { background:#86c964; }
.road { background:#b9b3a4; box-shadow:inset 0 0 0 1px #a8a292; }

.prop { position:absolute; pointer-events:none; text-align:center; }
.prop span { font-size:30px; filter:drop-shadow(2px 3px 2px rgba(0,0,0,.25)); }

.peca { position:absolute; cursor:pointer; }
.peca .face { position:absolute; }
.lift { transition:transform .2s; }
.peca:hover .lift { transform:translateY(-6px); }

/* FACHADA / PLACA com nome */
.sign {
  position:absolute; left:50%; transform:translateX(-50%);
  background:#fffef5; border:2px solid rgba(0,0,0,.22); border-radius:7px;
  display:flex; align-items:center; justify-content:center; line-height:1.12;
  font-weight:bold; color:#222; padding:3px 8px;
  box-shadow:0 3px 6px rgba(0,0,0,.35); z-index:8; pointer-events:none;
  width:max-content; max-width:120px; text-align:center;
}
.signtxt { display:block; white-space:normal; word-break:normal; overflow-wrap:normal; hyphens:none; }
.telhado { position:absolute; z-index:5; pointer-events:none; }

/* FAIXA do carro */
.carbox { position:absolute; }
.carbanner {
  position:absolute; left:50%; bottom:30px; transform:translateX(-50%);
  max-width:120px; background:#1f2937; color:#fff; border-radius:8px; padding:5px 9px;
  font-weight:bold; line-height:1.2; box-shadow:0 3px 8px rgba(0,0,0,.4);
  z-index:9; pointer-events:none; border:2px solid #facc15; text-align:center;
}
.carbanner::after { content:''; position:absolute; left:50%; bottom:-8px; transform:translateX(-50%); border:5px solid transparent; border-top-color:#1f2937; }
.ico { position:absolute; display:flex; align-items:center; justify-content:center; pointer-events:none; }

.fx { position:absolute; left:50%; transform:translateX(-50%); pointer-events:none; opacity:0; }
.boom  { top:-10px; font-size:0; z-index:9; }
.smoke { left:-4px; top:50%; font-size:20px; z-index:9; }
.peca.go { animation: drive 1.1s ease-in forwards; }
@keyframes drive { 0%{transform:translateX(0);} 12%{transform:translateX(-10px);} 100%{transform:translateX(130vw);} }
.peca.go .smoke { animation: smk 1.1s ease-out forwards; }
@keyframes smk { 0%{opacity:.8;transform:translate(0,-50%) scale(.6);} 100%{opacity:0;transform:translate(-50px,-50%) scale(1.6);} }

/* IMPLOSÃO: boneco desenhado + dinamite + desabamento */
.boneco { position:absolute; left:2px; bottom:-2px; opacity:0; z-index:14; pointer-events:none; overflow:visible; }
.boneco .arm { transform-box:fill-box; transform-origin:top center; }
.boneco .legA,.boneco .legB { transform-box:fill-box; transform-origin:top center; }
.dyn { position:absolute; left:20px; bottom:26px; width:11px; height:5px; background:#d62828; border-radius:2px; opacity:0; z-index:16; box-shadow:inset 0 0 0 1px #7a1414; }
.dyn::after { content:''; position:absolute; right:-2px; top:-4px; width:2px; height:5px; background:#555; }
.dyn i { position:absolute; right:-4px; top:-7px; width:4px; height:4px; border-radius:50%; background:#ffcf3f; box-shadow:0 0 5px 1px #ff8a00; }
.flash { position:absolute; left:50%; transform:translateX(-50%) scale(0); width:62px; height:62px; border-radius:50%; opacity:0; z-index:15; pointer-events:none; background:radial-gradient(circle,#fff 0%,#ffe27a 34%,rgba(255,160,40,.5) 60%,transparent 72%); }
.dust { position:absolute; left:0; bottom:0; width:100%; height:0; z-index:11; pointer-events:none; }
.puff { position:absolute; width:24px; height:24px; border-radius:50%; opacity:0; background:radial-gradient(circle at 40% 40%,#f3f0e9,#d8d3c6 60%,rgba(216,211,198,0) 72%); }
.deb { position:absolute; left:50%; bottom:12px; width:5px; height:5px; background:#6f6553; border-radius:1px; opacity:0; }

.peca.imp .boneco { animation: bRunIn 2.5s ease-in-out forwards; }
@keyframes bRunIn {
  0%{opacity:0; transform:translate(-70px,0);}
  4%{opacity:1;}
  24%{transform:translate(4px,-1px);}
  30%{transform:translate(7px,0);}
  34%{transform:translate(10px,0);}
  38%{transform:translate(3px,0);}
  46%{transform:translate(-4px,0);}
  100%{opacity:0; transform:translate(-82px,0);}
}
.peca.imp .boneco .arm { animation: throwArm 2.5s ease-in-out forwards; }
@keyframes throwArm {
  0%,28%{transform:rotate(-140deg);}
  32%{transform:rotate(-165deg);}
  37%{transform:rotate(70deg);}
  42%{transform:rotate(40deg);}
  100%{transform:rotate(30deg);}
}
.peca.imp .boneco .legA { animation: legRun .28s linear infinite; }
.peca.imp .boneco .legB { animation: legRun .28s linear infinite; animation-delay:-.14s; }
@keyframes legRun { 0%,100%{transform:rotate(22deg);} 50%{transform:rotate(-22deg);} }
.peca.imp .dyn { animation: dynFly 2.5s ease-in forwards; }
@keyframes dynFly {
  0%,33%{opacity:0; transform:translate(0,0) rotate(0);}
  34%{opacity:1;}
  37%{transform:translate(8px,-16px) rotate(150deg);}
  40%{transform:translate(16px,-8px) rotate(280deg);}
  42%{opacity:1; transform:translate(22px,4px) rotate(380deg);}
  44%{opacity:0;}
  100%{opacity:0;}
}
.peca.imp .flash { animation: bFlash .5s 1s ease-out forwards; }
@keyframes bFlash { 0%{opacity:1; transform:translateX(-50%) scale(.1);} 45%{opacity:1; transform:translateX(-50%) scale(1.1);} 100%{opacity:0; transform:translateX(-50%) scale(1.7);} }
.peca.imp .lift { transform-origin:50% 100%; animation: bCollapse 1.45s 1.05s cubic-bezier(.45,0,.85,.45) forwards; }
@keyframes bCollapse {
  0%{transform:translateY(0) scaleY(1);}
  5%{transform:translateY(0) scaleY(1.02);}
  12%{transform:translateY(2px) scaleY(.93);}
  100%{transform:translateY(7px) scaleY(.04); opacity:0;}
}
.peca.imp .sign { animation: bSign .4s 1.05s ease forwards; }
@keyframes bSign { to{opacity:0; transform:translateX(-50%) translateY(16px) scale(.7);} }
.peca.imp .puff { animation: puff 1.35s ease-out forwards; }
@keyframes puff { 0%{opacity:0; transform:scale(.3);} 20%{opacity:.95;} 100%{opacity:0; transform:scale(2.4) translateY(-10px);} }
.peca.imp .deb { animation: deb .8s ease-out forwards; }
@keyframes deb { 0%{opacity:1; transform:translate(-50%,0) rotate(0);} 100%{opacity:0; transform:translate(calc(-50% + var(--dx)),var(--dy)) rotate(240deg);} }
.peca.exp .lift, .peca.exp .sign, .peca.exp .telhado { animation: shake .35s ease, expOut .6s .35s ease forwards; }
.peca.exp .boom { animation: expFx .6s .35s ease-out forwards; }
@keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-3px,-2px) rotate(-3deg)} 50%{transform:translate(3px,2px) rotate(3deg)} 75%{transform:translate(-2px,1px) rotate(-2deg)} }
@keyframes expOut { 0%{transform:scale(1);opacity:1} 30%{transform:scale(1.35)} 100%{transform:scale(0);opacity:0} }
@keyframes expFx { 0%{font-size:0;opacity:1} 50%{font-size:70px;opacity:1} 100%{font-size:95px;opacity:0} }

.controles { background:#fff; padding:16px; border-radius:16px; margin-top:14px; box-shadow:0 8px 20px rgba(0,0,0,.2); }
.cab { font-weight:bold; color:#2a5298; margin-bottom:10px; }
.ig { display:flex; gap:10px; flex-wrap:wrap; }
input[type=text],select { padding:11px 14px; border:2px solid #e0e0e0; border-radius:10px; font-size:14px; font-family:inherit; }
input[type=text]{ flex:1; min-width:180px; } input:focus,select:focus{ outline:none; border-color:#2a5298; }
button.add { padding:11px 24px; background:linear-gradient(135deg,#ff9a44,#ff6a3d); color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
button.add:hover{ transform:translateY(-2px); }
.backup { margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; }
.backup button { padding:9px 16px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:13px; }
.b-exp { background:#2a5298; color:#fff; } .b-imp { background:#2e9e6e; color:#fff; }
.mini { position:absolute; right:12px; bottom:12px; z-index:50; display:flex; gap:8px; }
.mini button { background:rgba(255,255,255,.92); border:none; padding:8px 12px; border-radius:10px; font-weight:bold; cursor:pointer; box-shadow:0 3px 8px rgba(0,0,0,.2); font-size:13px; }
.placar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:14px 0 28px; }
.placar .c { background:rgba(255,255,255,.92); padding:9px 20px; border-radius:12px; text-align:center; box-shadow:0 4px 8px rgba(0,0,0,.15); }
.placar .n { font-size:22px; font-weight:bold; color:#2a5298; } .placar .l { font-size:12px; color:#666; }
@media(max-width:600px){ .ig{flex-direction:column;} input[type=text],select,button.add{width:100%;} }
</style>
</head>
<body>
<div class="tela">
  <div class="topo"><h1>🏙️ Cidade 3D da Vida</h1><p>Arraste pra explorar • Zoom: scroll do mouse ou pinça • Clique nas peças pra completar</p></div>
  <div class="viewport" id="viewport">
    <div class="mundo" id="mundo"></div>
    <div class="mini">
      <button onclick="zoomBtn(1.25)">➕</button>
      <button onclick="zoomBtn(0.8)">➖</button>
      <button onclick="recentrar()">🎯 Centro</button>
    </div>
  </div>
  <div class="controles">
    <div class="cab">🏗️ O que você precisa fazer?</div>
    <div class="ig">
      <input type="text" id="novoItem" placeholder="Ex: pagar conta, academia, comprar leite..." autocomplete="off">
      <select id="categoria">
        <option value="tarefa">🏢 Tarefa (prédio)</option>
        <option value="corrida">🚗 Corrida (Uber)</option>
        <option value="compra">🏪 Compra (mercado)</option>
      </select>
      <button class="add" onclick="adicionar()">➕ Construir</button>
    </div>
    <div class="backup">
      <button class="b-exp" onclick="exportJSON()">💾 Exportar backup (JSON)</button>
      <button class="b-imp" onclick="document.getElementById('fileImp').click()">📂 Importar backup</button>
      <input type="file" id="fileImp" accept="application/json,.json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>
  <div class="placar">
    <div class="c"><div class="n" id="sT">0</div><div class="l">🏢 Tarefas</div></div>
    <div class="c"><div class="n" id="sC">0</div><div class="l">🚗 Corridas</div></div>
    <div class="c"><div class="n" id="sM">0</div><div class="l">🏪 Compras</div></div>
    <div class="c"><div class="n" id="sX">0</div><div class="l">🏙️ Na cidade</div></div>
  </div>
</div>

<script>
const KEY='cidade-3d';
let N=14;                          // o mapa CRESCE conforme vai enchendo
const TW=84, TH=42, OY=90;
let OX=N*TW/2;
let CC=Math.floor(N/2);
const isRoad=(c,r)=> c%4===2 || r%4===2;
function sx(c,r){ return (c-r)*TW/2 + OX; }
function sy(c,r){ return (c+r)*TH/2 + OY; }

function buildSpots(){
  const cells=[], step=3;
  for(let c=1;c<N;c+=step) for(let r=1;r<N;r+=step){ if(c===CC&&r===CC) continue; cells.push({c,r}); }
  const cx=(N-1)/2, cy=(N-1)/2;
  cells.sort((a,b)=> Math.hypot(a.c-cx,a.r-cy)-Math.hypot(b.c-cx,b.r-cy));
  return cells;
}
let SPOTS=buildSpots();

/* aumenta o mapa mantendo SEMPRE folga de lotes livres (nada se sobrepõe) */
function growToFit(count){
  let changed=false;
  while(count + 3 > SPOTS.length){   // mantém 3 lotes de respiro
    N += 3;
    OX = N*TW/2;
    CC = Math.floor(N/2);
    SPOTS = buildSpots();
    changed=true;
  }
  return changed;
}

function load(){ const s=localStorage.getItem(KEY); return s?JSON.parse(s):[]; }
function save(it){ localStorage.setItem(KEY,JSON.stringify(it)); }

function freeSpot(items){
  growToFit(items.length+1);          // garante lote livre ANTES de escolher
  const occ=new Set(items.map(i=>i.c+','+i.r));
  for(const s of SPOTS){ if(!occ.has(s.c+','+s.r)) return s; }
  for(let c=0;c<N;c++) for(let r=0;r<N;r++){ if(c===CC&&r===CC) continue; if(!occ.has(c+','+r)) return {c,r}; }
  return {c:0,r:0};
}

function freeTile(items, wantRoad){
  const occ=new Set(items.map(i=>i.c+','+i.r));
  for(let s=0;s<N*2;s++){ for(let c=0;c<N;c++){ const r=s-c;
    if(r<0||r>=N) continue; if(isRoad(c,r)!==!!wantRoad) continue; if(occ.has(c+','+r)) continue; return {c,r}; } }
  return {c:Math.floor(Math.random()*N), r:Math.floor(Math.random()*N)};
}

function adicionar(){
  const inp=document.getElementById('novoItem'), cat=document.getElementById('categoria').value;
  const texto=inp.value.trim(); if(!texto) return;
  const items=load(); const t=freeSpot(items);
  items.push({id:Date.now(), texto, categoria:cat, c:t.c, r:t.r});
  save(items); inp.value=''; render(); inp.focus();
}

function completar(id, cat){
  const el=document.querySelector('[data-id="'+id+'"]'); if(!el||el.dataset.b) return;
  el.dataset.b='1';
  const cls = cat==='tarefa'?'imp': cat==='corrida'?'go':'exp';
  const dur = cat==='tarefa'?2500 : 1150;
  el.classList.add(cls);
  setTimeout(()=>{ save(load().filter(i=>i.id!==id)); render(); }, dur);
}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

/* altura por tipo, com variação pra cidade ficar viva */
function altura(it){
  if(it.categoria==='compra') return 42 + (it.id%3)*10;
  return 72 + (it.id%5)*16; // tarefa 72..136
}
const SKIN = {
  tarefa:{top:'#7cc0f7',l:'#2a72b8',r:'#4a93d6',roof:'#1d5a96'},
  compra:{top:'#ffcf6b',l:'#c9821a',r:'#e8a83c',roof:'#a85e0c'}
};
const ICO={tarefa:'🏢',compra:'🏪'};

/* faces com janelas */
function miniCube(cx,cyTop,w,h){
  const t=[[cx,cyTop],[cx+w/2,cyTop+w/4],[cx,cyTop+w/2],[cx-w/2,cyTop+w/4]];
  const l=[[cx-w/2,cyTop+w/4],[cx,cyTop+w/2],[cx,cyTop+w/2+h],[cx-w/2,cyTop+w/4+h]];
  const r=[[cx,cyTop+w/2],[cx+w/2,cyTop+w/4],[cx+w/2,cyTop+w/4+h],[cx,cyTop+w/2+h]];
  const P=a=>a.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  return `<polygon points="${P(l)}" fill="#838a90"/><polygon points="${P(r)}" fill="#a6acb2"/><polygon points="${P(t)}" fill="#ccd1d6"/>`;
}

function predioSVG(it,H){
  const W=TW,Hh=TH;
  const pal = it.categoria==='compra'
    ? {wallL:'#c2772a',wallR:'#e0973c',roofT:'#9c5916',win:'#bfe9ff',winLit:'#ffe28a',edge:'#7a430f',para:'#b8701d'}
    : {wallL:'#3f7fbf',wallR:'#5ba0dd',roofT:'#2c5f8f',win:'#d4f0ff',winLit:'#fff3a8',edge:'#244e78',para:'#3a73a8'};
  const PL=(u,v)=>[u*W/2, Hh/2+u*Hh/2+v*H];
  const PR=(u,v)=>[W/2+u*W/2, Hh-u*Hh/2+v*H];
  const P=a=>a.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const hash=n=>{const x=Math.sin(n)*10000;return x-Math.floor(x);};
  let s='';
  s+=`<polygon points="${P([PL(0,0),PL(1,0),PL(1,1),PL(0,1)])}" fill="${pal.wallL}" stroke="${pal.edge}" stroke-width="0.6"/>`;
  s+=`<polygon points="${P([PR(0,0),PR(1,0),PR(1,1),PR(0,1)])}" fill="${pal.wallR}" stroke="${pal.edge}" stroke-width="0.6"/>`;
  const cols=3, rows=Math.max(2,Math.min(8,Math.round(H/15)));
  const uPad=0.16,vT=0.10,vB=0.07;
  const cU=(1-2*uPad)/cols,wU=cU*0.60,oU=(cU-wU)/2;
  const cV=(1-vT-vB)/rows,wV=cV*0.62,oV=(cV-wV)/2;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const u0=uPad+c*cU+oU,u1=u0+wU,v0=vT+r*cV+oV,v1=v0+wV;
    const hL=hash(it.id*0.013+(r*7+c)*1.7);
    const fL=hL<0.22?pal.winLit:(hL<0.40?pal.edge:pal.win);
    s+=`<polygon points="${P([PL(u0,v0),PL(u1,v0),PL(u1,v1),PL(u0,v1)])}" fill="${fL}"/>`;
    const hR=hash(it.id*0.013+(r*7+c)*1.7+50);
    const fR=hR<0.22?pal.winLit:(hR<0.40?pal.edge:pal.win);
    s+=`<polygon points="${P([PR(u0,v0),PR(u1,v0),PR(u1,v1),PR(u0,v1)])}" fill="${fR}"/>`;
  }
  const rTop=[[W/2,0],[W,Hh/2],[W/2,Hh],[0,Hh/2]];
  s+=`<polygon points="${P(rTop)}" fill="${pal.roofT}"/>`;
  const sc=f=>rTop.map(p=>[W/2+(p[0]-W/2)*f,Hh/2+(p[1]-Hh/2)*f]);
  s+=`<polygon points="${P(sc(0.72))}" fill="${pal.para}"/>`;
  const mw=W*0.30,mh=11,mcx=W*0.5,mcyTop=Hh/2-mw/2-mh;
  s+=miniCube(mcx,mcyTop,mw,mh);
  s+=`<line x1="${(W*0.5).toFixed(1)}" y1="${mcyTop.toFixed(1)}" x2="${(W*0.5).toFixed(1)}" y2="${(mcyTop-14).toFixed(1)}" stroke="${pal.edge}" stroke-width="1.4"/><circle cx="${(W*0.5).toFixed(1)}" cy="${(mcyTop-14).toFixed(1)}" r="2.3" fill="#e23b3b"/>`;
  return `<svg width="${W}" height="${Hh+H}" viewBox="0 -22 ${W} ${Hh+H+22}" style="overflow:visible;display:block;">${s}</svg>`;
}

/* prédios agora gerados por predioSVG() */

function render(){
  const items=load();
  growToFit(items.length);           // expande o mapa se um backup trouxe muita coisa
  const mundo=document.getElementById('mundo');
  let html='';
  for(let s=0;s<N*2-1;s++){ for(let c=0;c<N;c++){ const r=s-c; if(r<0||r>=N) continue;
    const x=sx(c,r)-TW/2, y=sy(c,r)-TH/2, z=(c+r);
    const cls = isRoad(c,r)?'road':('grass'+(((c+r)%2)?' alt':''));
    html+=`<div class="tile ${cls}" style="left:${x}px;top:${y}px;z-index:${z};"></div>`; } }
  const cc=Math.floor(N/2);
  html+=`<div class="prop" style="left:${sx(cc,cc)-15}px;top:${sy(cc,cc)-40}px;z-index:${(cc+cc)*10+4};"><span>⛲</span></div>`;

  mundo.innerHTML=html;
  mundo.style.width=(N*TW)+'px'; mundo.style.height=(N*TH+200)+'px';

  items.forEach(it=>{
    const baseX=sx(it.c,it.r)-TW/2, z=(it.c+it.r)*10+5;
    const wrap=document.createElement('div'); wrap.className='peca'; wrap.dataset.id=it.id;
    wrap.onclick=()=>completar(it.id,it.categoria);

    if(it.categoria==='corrida'){
      const H=14, baseY=sy(it.c,it.r)-TH/2 - H;
      wrap.style.cssText=`left:${baseX}px;top:${baseY}px;width:${TW}px;height:${TH+H}px;z-index:${z};`;
      wrap.innerHTML=
        `<div class="lift">`+
        `<div class="face" style="left:10px;top:${H+4}px;width:${TW-20}px;height:${TH-6}px;background:#333;opacity:.22;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);"></div>`+
        `<div class="ico" style="left:0;top:${H-8}px;width:${TW}px;height:${TH}px;font-size:32px;">🚗</div>`+
        `</div>`+
        `<div class="carbanner"><span class="signtxt">${esc(it.texto)}</span></div>`+
        `<div class="fx smoke">💨</div>`;
    } else {
      const H=altura(it), baseY=sy(it.c,it.r)-TH/2 - H;
      wrap.style.cssText=`left:${baseX}px;top:${baseY}px;width:${TW}px;height:${TH+H}px;z-index:${z};`;
      const signTop = Math.round(TH/2 + H*0.18);
      const flashTop = Math.round(TH/2 + H*0.22);
      let puffs='', debs='';
      for(let i=0;i<7;i++){ const px=8+Math.round(Math.random()*62), pb=-2+Math.round(Math.random()*14), pd=(1.05+Math.random()*0.25).toFixed(2); puffs+=`<div class="puff" style="left:${px}px;bottom:${pb}px;animation-delay:${pd}s;"></div>`; }
      for(let i=0;i<6;i++){ const dx=Math.round(Math.random()*50-25), dy=-(18+Math.round(Math.random()*28)), dd=(1.05+Math.random()*0.12).toFixed(2); debs+=`<div class="deb" style="--dx:${dx}px;--dy:${dy}px;animation-delay:${dd}s;"></div>`; }
      const boneco = `<svg class="boneco" viewBox="0 0 36 48" width="32" height="44"><circle cx="18" cy="7" r="4.2" fill="#f2c79a" stroke="#222" stroke-width="1.3"/><rect x="16.6" y="11" width="2.8" height="15" rx="1.4" fill="#2b6cb0"/><rect class="legA" x="16.7" y="25" width="2.6" height="15" rx="1.3" fill="#333"/><rect class="legB" x="16.7" y="25" width="2.6" height="15" rx="1.3" fill="#555"/><rect x="13" y="15" width="2.3" height="10" rx="1.1" fill="#2b6cb0" transform="rotate(38 14 16)"/><g class="arm"><rect x="16.8" y="14.5" width="2.4" height="11" rx="1.2" fill="#2b6cb0"/></g></svg>`;
      const fxTarefa = boneco + `<div class="dyn"><i></i></div>` + `<div class="flash" style="top:${flashTop}px;"></div>` + `<div class="dust">${puffs}${debs}</div>`;
      wrap.innerHTML=
        `<div class="lift">${predioSVG(it,H)}</div>`+
        `<div class="sign" style="top:${signTop}px;"><span class="signtxt">${esc(it.texto)}</span></div>`+
        (it.categoria==='tarefa'? fxTarefa : `<div class="fx boom">💥</div>`);
    }
    mundo.appendChild(wrap);
  });

  document.querySelectorAll('.sign,.carbanner').forEach(fitText);

  document.getElementById('sT').textContent=items.filter(i=>i.categoria==='tarefa').length;
  document.getElementById('sC').textContent=items.filter(i=>i.categoria==='corrida').length;
  document.getElementById('sM').textContent=items.filter(i=>i.categoria==='compra').length;
  document.getElementById('sX').textContent=items.length;
}

/* ajusta a fonte da fachada pra NUNCA estourar */
function fitText(sign){
  const span=sign.firstElementChild; if(!span) return;
  let fs=13; span.style.fontSize=fs+'px';
  let g=40;
  while(sign.scrollWidth > sign.clientWidth+1 && fs>7 && g-->0){ fs-=0.5; span.style.fontSize=fs+'px'; }
}

/* ===== BACKUP JSON ===== */
function exportJSON(){
  const data=localStorage.getItem(KEY)||'[]';
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dt=new Date().toISOString().slice(0,10);
  a.href=url; a.download='cidade-da-vida-backup-'+dt+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),500);
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
      const arr=JSON.parse(rd.result);
      if(!Array.isArray(arr)){ alert('Arquivo inválido: esperado uma lista.'); return; }
      const atual=load();
      const ok=confirm('Importar '+arr.length+' itens?\n\nOK = SUBSTITUIR tudo\nCancelar = JUNTAR com o que já existe');
      let novo;
      if(ok){ novo=arr; }
      else { const ids=new Set(atual.map(i=>i.id)); novo=atual.concat(arr.filter(i=>!ids.has(i.id))); }
      save(novo); render();
      alert('Pronto! Agora a cidade tem '+novo.length+' itens.');
    }catch(e){ alert('Erro ao ler o JSON.'); }
  };
  rd.readAsText(f); ev.target.value='';
}

/* ===== PAN + ZOOM (mouse/scroll no PC, pinça no celular) ===== */
let tx=0,ty=0,scale=1,drag=false,sxp=0,syp=0;
const MINZ=0.35, MAXZ=3;
const vp=document.getElementById('viewport'), mundoEl=document.getElementById('mundo');
mundoEl.style.transformOrigin='0 0';
function apply(){ mundoEl.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; }
const clampz=v=>Math.max(MINZ,Math.min(MAXZ,v));

/* zoom focando num ponto (px,py = relativo ao viewport) */
function zoomAt(px,py,factor){
  const ns=clampz(scale*factor), f=ns/scale;
  tx = px - (px - tx)*f;
  ty = py - (py - ty)*f;
  scale=ns; apply();
}
function zoomBtn(factor){ zoomAt(vp.clientWidth/2, vp.clientHeight/2, factor); }
function recentrar(){ scale=1; const vw=vp.clientWidth, vh=vp.clientHeight; tx=vw/2-OX; ty=vh/2-((N-1)*TH/2+OY); apply(); }

/* zoom com o scroll do mouse, focando no cursor */
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=vp.getBoundingClientRect();
  zoomAt(e.clientX-rect.left, e.clientY-rect.top, e.deltaY<0?1.12:1/1.12);
},{passive:false});

/* arrastar (1 dedo/mouse) + pinça de zoom (2 dedos) */
const ptrs=new Map(); let pinchD=0;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
vp.addEventListener('pointerdown',e=>{
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===1){ drag=true; sxp=e.clientX-tx; syp=e.clientY-ty; vp.classList.add('grabbing'); }
  else { drag=false; vp.classList.remove('grabbing'); const p=[...ptrs.values()]; pinchD=dist(p[0],p[1]); }
});
window.addEventListener('pointermove',e=>{
  if(ptrs.has(e.pointerId)) ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size>=2){
    const p=[...ptrs.values()], d=dist(p[0],p[1]), rect=vp.getBoundingClientRect();
    const mx=(p[0].x+p[1].x)/2-rect.left, my=(p[0].y+p[1].y)/2-rect.top;
    if(pinchD>0) zoomAt(mx,my, d/pinchD);
    pinchD=d; return;
  }
  if(drag){ tx=e.clientX-sxp; ty=e.clientY-syp; apply(); }
});
function endPtr(e){
  ptrs.delete(e.pointerId);
  if(ptrs.size<2) pinchD=0;
  if(ptrs.size===0){ drag=false; vp.classList.remove('grabbing'); }
  else if(ptrs.size===1){ const p=[...ptrs.values()][0]; drag=true; sxp=p.x-tx; syp=p.y-ty; }
}
window.addEventListener('pointerup',endPtr);
window.addEventListener('pointercancel',endPtr);

document.getElementById('novoItem').addEventListener('keypress',e=>{ if(e.key==='Enter') adicionar(); });
render(); recentrar();
</script>
